version: 2
updates:
  # Python dependencies (backend)
  - package-ecosystem: "pip"
    directory: "/backend"
    schedule:
      interval: "monthly"
    labels:
      - "dependencies"
      - "python"
    commit-message:
      prefix: "chore(deps):"
    open-pull-requests-limit: 5
    groups:
      python-minor-and-patch:
        applies-to: version-updates
        update-types:
          - "minor"
          - "patch"

  # npm dependencies (frontend)
  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "monthly"
    labels:
      - "dependencies"
      - "javascript"
    commit-message:
      prefix: "chore(deps):"
    open-pull-requests-limit: 5
    groups:
      # Pair vite with its plugins (peer-dep coupled). Must come before the
      # broader minor-and-patch group so first-match-wins routes these packages
      # here for all update types. See issue #327 for the ERESOLVE rationale.
      vite-ecosystem:
        applies-to: version-updates
        patterns:
          - "vite"
          - "@vitejs/plugin-*"
        update-types:
          - "major"
          - "minor"
          - "patch"
      npm-minor-and-patch:
        applies-to: version-updates
        update-types:
          - "minor"
          - "patch"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    labels:
      - "dependencies"
      - "ci"
    commit-message:
      prefix: "ci(deps):"
    open-pull-requests-limit: 5
    groups:
      actions-all:
        applies-to: version-updates
        patterns:
          - "*"
